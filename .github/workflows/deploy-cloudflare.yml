# Deploy with secrets from GitHub (Repository → Settings → Secrets and variables → Actions).
# Add: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, NUXT_PUBLIC_MAPBOX_ACCESS_TOKEN
# Optional: NUXT_PUBLIC_GOOGLE_MAPS_API_KEY
#
# If the project is also connected to Cloudflare’s Git integration, disable one path
# to avoid duplicate deploys (prefer this workflow + turn off auto-build in Cloudflare).

name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build and deploy Worker + assets
        run: npm run worker:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NUXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NUXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}
          NUXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NUXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
